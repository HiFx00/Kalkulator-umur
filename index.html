<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Umur</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
width:300px;
}

h1{
margin-bottom:20px;
}

input{
padding:10px;
width:100%;
margin-bottom:15px;
font-size:16px;
}

button{
padding:10px;
width:100%;
background:#4CAF50;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

#result{
margin-top:15px;
font-size:18px;
font-weight:bold;
}
</style>

</head>
<body>

<div class="container">
<h1>Kalkulator Umur</h1>

<input type="date" id="birthdate">

<button onclick="hitungUmur()">Hitung Umur</button>

<div id="result"></div>
</div>

<script>
function hitungUmur(){

let birthdate = new Date(document.getElementById("birthdate").value);
let today = new Date();

if(!birthdate.getTime()){
document.getElementById("result").innerHTML="Masukkan tanggal lahir dulu";
return;
}

let age = today.getFullYear() - birthdate.getFullYear();

let m = today.getMonth() - birthdate.getMonth();

if(m < 0 || (m === 0 && today.getDate() < birthdate.getDate())){
age--;
}

document.getElementById("result").innerHTML="Umur kamu: " + age + " tahun";
}
</script>

</body>
</html>
